<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodExpress</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    width:700px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:red;
    font-weight:bold;
    font-size:18px;
}

.location{
    color:#555;
}

/* Categories */

.categories{
    margin:15px 0;
}

.categories button{
    border:none;
    padding:6px 12px;
    margin-right:8px;
    border-radius:15px;
    background:#f3dede;
    cursor:pointer;
}

/* Cards */

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
}

.img{
    height:80px;
    background:#eee;
    border-radius:5px;
    margin-bottom:10px;
}

.name{
    font-weight:bold;
}

.type{
    color:#666;
    font-size:13px;
}

.bottom{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.rating{
    background:#2ecc71;
    color:white;
    padding:2px 6px;
    border-radius:4px;
    font-size:12px;
}

.time{
    background:#f4b400;
    padding:2px 6px;
    border-radius:4px;
    font-size:12px;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">FoodExpress</div>
<div class="location">Delivering to Delhi</div>
</div>

<div class="categories">
<button>Pizza</button>
<button>Burger</button>
<button>Chinese</button>
<button>Desserts</button>
</div>

<div class="cards">

<div class="card">
<div class="img"></div>
<div class="name">Pizza Palace</div>
<div class="type">Italian • Fast Food</div>

<div class="bottom">
<span class="rating">4.3 ★</span>
<span class="time">30 min</span>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="name">Burger Hub</div>
<div class="type">American • Burgers</div>

<div class="bottom">
<span class="rating">4.5 ★</span>
<span class="time">25 min</span>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="name">Dragon Wok</div>
<div class="type">Chinese • Noodles</div>

<div class="bottom">
<span class="rating">4.2 ★</span>
<span class="time">35 min</span>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="name">Sweet Treats</div>
<div class="type">Desserts • Bakery</div>

<div class="bottom">
<span class="rating">4.6 ★</span>
<span class="time">20 min</span>
</div>
</div>

</div>

<div class="footer">
© 2026 FoodExpress Platform
</div>

</div>

</body>
</html>
